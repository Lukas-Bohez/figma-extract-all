<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extract All – Figma to Anything</title>
<style>
  :root {
    --bg: #1e1e1e;
    --bg2: #2d2d2d;
    --bg3: #3c3c3c;
    --fg: #e0e0e0;
    --fg2: #b0b0b0;
    --accent: #18a0fb;
    --accent2: #0d8ae0;
    --green: #4caf50;
    --orange: #ff9800;
    --red: #f44336;
    --purple: #9c27b0;
    --border: #404040;
    --radius: 6px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--fg);
    font-size: 12px;
    line-height: 1.4;
    overflow-y: auto;
    padding: 12px;
    user-select: none;
    -webkit-user-select: none;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  .header {
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .header .subtitle {
    font-size: 10px;
    color: var(--fg2);
  }

  .section {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--fg2);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title .icon { font-size: 14px; }

  /* Buttons */
  button {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--fg);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    justify-content: center;
  }
  button:hover { background: #4a4a4a; border-color: #555; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  button.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.accent:hover { background: var(--accent2); }

  button.green { background: var(--green); border-color: var(--green); color: #fff; }
  button.green:hover { background: #43a047; }

  button.orange { background: var(--orange); border-color: var(--orange); color: #fff; }
  button.orange:hover { background: #f57c00; }

  button.purple { background: var(--purple); border-color: var(--purple); color: #fff; }
  button.purple:hover { background: #8e24aa; }

  button.red { background: var(--red); border-color: var(--red); color: #fff; }
  button.red:hover { background: #e53935; }

  button.full { width: 100%; }

  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .btn-row:last-child { margin-bottom: 0; }
  .btn-row button { flex: 1; min-width: 80px; }

  .btn-row-3 button { flex: 1 1 calc(33.333% - 4px); }
  .btn-row-2 button { flex: 1 1 calc(50% - 3px); }

  /* Labels and inputs */
  label {
    font-size: 11px;
    color: var(--fg2);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  label:hover { color: var(--fg); }

  select, input[type="number"] {
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--fg);
    outline: none;
  }
  select:focus, input[type="number"]:focus {
    border-color: var(--accent);
  }
  input[type="number"] { width: 60px; }

  .inline-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  /* Progress bar */
  .progress-container {
    margin-top: 8px;
    display: none;
  }
  .progress-container.show { display: block; }

  .progress-bar {
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 10px;
    color: var(--fg2);
    text-align: center;
  }

  /* Log area */
  .log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 10px;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    color: var(--fg2);
    line-height: 1.6;
    margin-top: 8px;
    display: none;
  }
  .log.show { display: block; }
  .log .log-entry { padding: 1px 0; }
  .log .log-entry.success { color: var(--green); }
  .log .log-entry.error { color: var(--red); }
  .log .log-entry.info { color: var(--accent); }

  /* Spinner */
  .spinner {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status */
  .status {
    text-align: center;
    font-size: 10px;
    color: var(--fg2);
    margin-top: 8px;
    min-height: 18px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 9px;
    font-weight: 600;
    margin-left: 4px;
  }
  .badge.svg { background: rgba(24,160,251,0.2); color: var(--accent); }
  .badge.png { background: rgba(156,39,176,0.2); color: var(--purple); }
  .badge.json { background: rgba(76,175,80,0.2); color: var(--green); }

  .footer {
    text-align: center;
    font-size: 9px;
    color: #555;
    margin-top: 12px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Selection info */
  .selection-info {
    background: rgba(24,160,251,0.08);
    border: 1px solid rgba(24,160,251,0.25);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 8px;
    display: none;
  }
  .selection-info.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>⬇ Extract All</h1>
  <div class="subtitle">Figma to Anything • One-Click Export</div>
</div>

<!-- Selected Nodes Info -->
<div class="selection-info" id="selectionInfo">
  📌 <span id="selectionCount">0</span> node(s) selected
  — use the "Selected" buttons below to export
</div>

<!-- ═══════════════ DATA EXTRACTION ═══════════════ -->
<div class="section">
  <div class="section-title"><span class="icon">📊</span> Data Extraction</div>

  <div class="btn-row btn-row-2">
    <button class="green full" onclick="requestExtract('get-full-extract')" id="btnFullExtract">
      📦 Full Extract (JSON)
    </button>
    <button onclick="requestExtract('get-text')" id="btnText">
      📝 Text Only
    </button>
  </div>
  <div class="btn-row btn-row-2">
    <button onclick="requestExtract('get-variables')" id="btnVars">
      🎨 Variables
    </button>
    <button onclick="requestExtract('get-styles')" id="btnStyles">
      🖌 Styles
    </button>
  </div>
  <div class="btn-row btn-row-2">
    <button onclick="requestExtract('get-components')" id="btnComps">
      🧩 Components
    </button>
    <button onclick="requestExtract('get-pages')" id="btnPages">
      📄 Pages Info
    </button>
  </div>
</div>

<!-- ═══════════════ SELECTED NODES ═══════════════ -->
<div class="section">
  <div class="section-title"><span class="icon">🎯</span> Selected Nodes Export</div>

  <div class="inline-controls">
    <label>Scale: <input type="number" id="scaleSelected" value="2" min="0.25" max="8" step="0.25"></label>
  </div>

  <div class="btn-row btn-row-3">
    <button class="accent" onclick="exportSelected('export-selected-svg')">
      <span class="badge svg">SVG</span> Export
    </button>
    <button class="purple" onclick="exportSelected('export-selected-png')">
      <span class="badge png">PNG</span> Export
    </button>
    <button class="orange" onclick="exportSelected('export-selected-jpg')">
      <span class="badge">JPG</span> Export
    </button>
  </div>
  <div class="btn-row">
    <button onclick="exportSelected('get-svg-as-text')" style="flex:1;">
      📋 SVG Code (Text)
    </button>
  </div>
</div>

<!-- ═══════════════ BATCH EXPORT ═══════════════ -->
<div class="section">
  <div class="section-title"><span class="icon">🗂</span> Batch Export (All Nodes)</div>

  <div class="inline-controls">
    <label>Scale: <input type="number" id="scaleBatch" value="1" min="0.25" max="8" step="0.25"></label>
  </div>

  <div class="btn-row">
    <button class="accent full" onclick="batchExport('export-all-svg-page', 'current')" id="btnAllSvgPage">
      🖼 Export ALL as SVG — Current Page
    </button>
  </div>
  <div class="btn-row">
    <button class="purple full" onclick="batchExport('export-all-png-page', 'current')" id="btnAllPngPage">
      🖼 Export ALL as PNG — Current Page
    </button>
  </div>

  <hr>

  <div class="btn-row">
    <button class="accent full" onclick="batchExport('export-all-svg-all-pages', 'all')" id="btnAllSvgAll">
      🌐 Export ALL as SVG — ALL Pages
    </button>
  </div>
  <div class="btn-row">
    <button class="purple full" onclick="batchExport('export-all-png-all-pages', 'all')" id="btnAllPngAll">
      🌐 Export ALL as PNG — ALL Pages
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-container" id="progressContainer">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>
</div>

<!-- ═══════════════ LOG ═══════════════ -->
<div class="log" id="logArea"></div>

<!-- Status -->
<div class="status" id="statusBar">
  Ready — select nodes or use batch export
</div>

<!-- Footer -->
<div class="footer">
  Extract All v1.0.0 • <a href="https://github.com" target="_blank">GitHub</a> •
  Open Source MIT
</div>

<script>
// ─────────────────────────────────────────────
// UI Script for Extract All Figma Plugin
// ─────────────────────────────────────────────

const logArea = document.getElementById("logArea");
const statusBar = document.getElementById("statusBar");
const progressContainer = document.getElementById("progressContainer");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const selectionInfo = document.getElementById("selectionInfo");
const selectionCount = document.getElementById("selectionCount");

let exportCount = 0;
let isExporting = false;

// ── Logging ────────────────────────────────────

function log(message, type) {
  type = type || "info";
  if (!logArea.classList.contains("show")) {
    logArea.classList.add("show");
    logArea.innerHTML = "";
  }
  const entry = document.createElement("div");
  entry.className = "log-entry " + type;
  entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
  logArea.appendChild(entry);
  logArea.scrollTop = logArea.scrollHeight;

  // Auto-hide after 15 seconds of no activity
  clearTimeout(logArea._hideTimeout);
  logArea._hideTimeout = setTimeout(() => {
    if (!isExporting) {
      logArea.classList.remove("show");
    }
  }, 15000);
}

function setStatus(msg) {
  statusBar.textContent = msg;
}

// ── Download Helpers ───────────────────────────

function downloadFile(fileName, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  log(`📥 Downloaded: ${fileName}`, "success");
}

function downloadBytes(fileName, bytes, format) {
  const mimeMap = {
    svg: "image/svg+xml",
    png: "image/png",
    jpg: "image/jpeg",
    pdf: "application/pdf",
  };
  const mimeType = mimeMap[format] || "application/octet-stream";
  const uint8 = new Uint8Array(bytes);
  const blob = new Blob([uint8], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Request to Plugin ──────────────────────────

function requestExtract(type) {
  if (isExporting) {
    log("⚠ Already exporting, please wait...", "error");
    return;
  }
  log(`🔍 Requesting: ${type}`, "info");
  setStatus(`Extracting ${type.replace("get-", "")}...`);
  parent.postMessage({ pluginMessage: { type: type } }, "*");
}

function exportSelected(type) {
  if (isExporting) {
    log("⚠ Already exporting, please wait...", "error");
    return;
  }
  const scale = parseFloat(document.getElementById("scaleSelected").value) || 1;
  isExporting = true;
  exportCount = 0;
  log(`🎯 Exporting selected nodes as ${type} (scale: ${scale}x)...`, "info");
  setStatus("Exporting selected nodes...");
  parent.postMessage({ pluginMessage: { type: type, scale: scale } }, "*");
}

function batchExport(type, scope) {
  if (isExporting) {
    log("⚠ Already exporting, please wait...", "error");
    return;
  }
  const scale = parseFloat(document.getElementById("scaleBatch").value) || 1;
  isExporting = true;
  exportCount = 0;

  // Show progress
  progressContainer.classList.add("show");
  progressFill.style.width = "0%";
  progressText.textContent = "Starting...";

  log(`🗂 Batch export: ${type} (scale: ${scale}x, scope: ${scope})...`, "info");
  setStatus(`Batch exporting ${scope === "all" ? "ALL pages" : "current page"}...`);

  parent.postMessage({ pluginMessage: { type: type, scale: scale } }, "*");
}

// ── Message Handler ────────────────────────────

window.addEventListener("message", (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  switch (msg.type) {

    // ── Full Extract ──
    case "full-extract":
      log(`✅ Full extract complete: ${msg.data.fileName}`, "success");
      log(`   Pages: ${msg.data.totalPages}, Text nodes: ${msg.data.textNodes.length}, Variables: ${msg.data.variables.length}, Styles: ${msg.data.styles.length}`, "info");
      setStatus("Full extract complete — downloading JSON...");
      break;

    // ── Download File (text/json) ──
    case "download-file":
      downloadFile(msg.fileName, msg.content, msg.mimeType);
      setStatus(`Downloaded: ${msg.fileName}`);
      break;

    // ── Export Results (binary: SVGs, PNGs, etc.) ──
    case "export-results":
      if (msg.results && msg.results.length > 0) {
        for (const item of msg.results) {
          const ext = item.format.toLowerCase();
          const fileName = `${item.name}.${ext}`;
          downloadBytes(fileName, item.bytes, ext);
          exportCount++;
        }
        log(`   ✅ Exported ${msg.results.length} file(s)`, "success");
        setStatus(`Exported ${exportCount} files so far...`);
      }
      break;

    // ── Progress ──
    case "progress":
      if (msg.total > 0) {
        const pct = Math.round((msg.current / msg.total) * 100);
        progressFill.style.width = pct + "%";
        progressText.textContent = `${msg.current} / ${msg.total} (${pct}%)`;
      }
      break;

    // ── Export Complete ──
    case "export-complete":
      isExporting = false;
      progressFill.style.width = "100%";
      progressText.textContent = `Complete — ${exportCount} files exported`;
      log(`🏁 Batch export complete! Total files: ${exportCount}`, "success");
      setStatus(`✅ Done! Exported ${exportCount} files.`);

      // Hide progress after 3 seconds
      setTimeout(() => {
        progressContainer.classList.remove("show");
        progressFill.style.width = "0%";
      }, 3000);
      break;

    // ── Node Tree ──
    case "node-tree":
      log(`🌳 Node tree: ${msg.nodes.length} nodes on current page`, "info");
      setStatus(`Loaded node tree: ${msg.nodes.length} nodes`);
      break;

    // ── Error ──
    case "error":
      isExporting = false;
      log(`❌ ${msg.message}`, "error");
      setStatus(`Error: ${msg.message}`);
      progressContainer.classList.remove("show");
      break;

    default:
      break;
  }
});

// ── Selection Listener ─────────────────────────
// We poll for selection changes by requesting from the plugin

function refreshSelection() {
  parent.postMessage({ pluginMessage: { type: "get-node-tree" } }, "*");
}

// Initial refresh
setTimeout(refreshSelection, 300);

// ── Keyboard Shortcuts ─────────────────────────
document.addEventListener("keydown", (e) => {
  // Ctrl+Enter or Cmd+Enter to do full extract
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    e.preventDefault();
    requestExtract("get-full-extract");
  }
  // Escape to cancel / close
  if (e.key === "Escape" && isExporting) {
    isExporting = false;
    log("⚠ Export cancelled by user", "error");
    setStatus("Cancelled");
    progressContainer.classList.remove("show");
  }
});

// ── Init ────────────────────────────────────────
log("🚀 Extract All ready. Select nodes or use batch export.", "info");
log("💡 Tip: Select nodes in Figma, then use 'Selected Nodes' section.", "info");
log("⌨ Shortcut: Ctrl+Enter = Full Extract", "info");
setStatus("Ready — select nodes or use batch export");

// Periodically check for selection updates
setInterval(() => {
  parent.postMessage({ pluginMessage: { type: "get-node-tree" } }, "*");
}, 2000);
</script>

</body>
</html>
